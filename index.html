<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador de Times de Futebol</title>
    <!-- Carrega o Tailwind CSS para estilização moderna e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteca para capturar HTML e transformá-lo em imagem (Canvas) -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* Define a fonte Inter como padrão */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb; /* Cor de fundo suave */
        }
        /* Estilos personalizados para os cards dos times */
        .team-card {
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .team-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
        }
        /* Estilo para a lista de jogadores */
        .player-list {
            list-style-type: none;
            padding: 0;
            margin-top: 1rem;
        }
        .player-list li {
            padding: 0.5rem 0;
            border-bottom: 1px dashed #e2e8f0;
            font-weight: 500;
            color: #1a202c;
            /* Adiciona uma transição para a aparição suave do jogador */
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }
        .player-list li.animated-in {
            opacity: 1;
            transform: translateY(0);
        }
        .player-list li:last-child {
            border-bottom: none;
        }
        /* Adiciona um estilo para o overlay de carregamento da imagem */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
            border-radius: 0.75rem; /* rounded-xl */
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-4xl mx-auto bg-white p-6 sm:p-10 rounded-xl shadow-2xl relative">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-800">Sorteio Dinâmico de Times</h1>
            <p class="text-xl text-gray-500 mt-2">Defina o número de times e o mínimo de jogadores por time.</p>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            
            <!-- Coluna 1: Lista de Jogadores -->
            <div class="md:col-span-1">
                <h2 class="text-2xl font-semibold mb-4 text-gray-700">1. Lista de Jogadores</h2>
                <textarea
                    id="names-input"
                    rows="10"
                    placeholder="Cole ou digite os nomes aqui, um por linha. Adicione * no nome para separar jogadores (Ex: Pelé*)"
                    maxlength="2000"
                    class="w-full p-4 border-2 border-blue-300 rounded-lg focus:ring-4 focus:ring-blue-200 transition duration-300 resize-none text-gray-800"
                ></textarea>
                <p class="text-xs text-gray-400 mt-2 italic">* Jogadores com asterisco serão distribuídos em times diferentes para equilibrar.</p>
            </div>

            <!-- Coluna 2: Parâmetros e Ação -->
            <div class="md:col-span-1">
                <h2 class="text-2xl font-semibold mb-4 text-gray-700">2. Parâmetros e Sorteio</h2>
                
                <div class="space-y-4 mb-6 p-4 border-2 border-gray-200 rounded-lg bg-gray-50">
                    <!-- Campo: Número de Times -->
                    <label class="block">
                        <span class="text-gray-600 font-medium">Número de Times:</span>
                        <input id="num-teams-input" type="number" value="3" min="2" 
                               class="mt-1 block w-full p-2 border-2 border-indigo-300 rounded-lg focus:ring-4 focus:ring-indigo-200 text-gray-800"
                        >
                    </label>
                    
                    <!-- Campo: Mínimo de Jogadores por Time -->
                    <label class="block">
                        <span class="text-gray-600 font-medium">Mínimo de Jogadores por Time:</span>
                        <input id="min-players-input" type="number" value="6" min="1"
                               class="mt-1 block w-full p-2 border-2 border-indigo-300 rounded-lg focus:ring-4 focus:ring-indigo-200 text-gray-800"
                        >
                    </label>
                </div>

                <button
                    onclick="sortearTimes()"
                    id="sort-button"
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-full shadow-lg transition duration-300 ease-in-out transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-4 focus:ring-green-300 text-lg"
                >
                    ⚽ Sortear Times
                </button>
                <div id="error-message" class="mt-4 text-red-600 font-medium hidden"></div>
                <!-- Altera a cor para azul vibrante durante o sorteio -->
                <div id="count-message" class="mt-4 text-blue-600 font-medium hidden"></div>
            </div>
        </section>
        
        <!-- Overlay de carregamento para a captura de imagem -->
        <div id="loading-capture" class="loading-overlay hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-t-4 border-blue-500 border-t-transparent mb-3"></div>
            <p class="text-gray-700 font-semibold">Gerando imagem dos times...</p>
        </div>


        <section id="results-section" class="mt-10 border-t pt-8 hidden">
            
            <!-- ÁREA DE CAPTURA DE IMAGEM -->
            <div id="capture-area">
                <h2 class="text-3xl font-bold text-blue-800 mb-2 text-center">Times Sorteados</h2>
                
                <!-- Contador de Sorteios -->
                <p id="draw-counter" class="text-sm text-gray-700 mb-1 text-center font-bold"></p> 

                <!-- Elemento para exibir a data e hora do sorteio -->
                <p id="draw-datetime" class="text-sm text-gray-500 mb-6 text-center"></p> 
                
                <!-- O container de times agora será preenchido dinamicamente -->
                <div id="teams-container" class="grid gap-6"> 
                    <!-- Cards dos times serão inseridos aqui pelo JavaScript -->
                </div>
            </div>
            <!-- FIM DA ÁREA DE CAPTURA -->


            <!-- Botões de Compartilhamento -->
            <div class="flex flex-col sm:flex-row justify-center space-y-4 sm:space-y-0 sm:space-x-4 mt-8">
                <button
                    onclick="captureImage()"
                    id="capture-button"
                    class="hidden bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transition duration-300 ease-in-out focus:outline-none focus:ring-4 focus:ring-blue-300 text-lg flex items-center justify-center"
                >
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664.89l1.416.708a2 2 0 001.664 0l1.416-.708A2 2 0 0015.07 7H16a2 2 0 012 2v6a2 2 0 01-2 2H8a2 2 0 01-2-2V9a2 2 0 012-2z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 17a3 3 0 100-6 3 3 0 000 6z"></path></svg>
                    Capturar Imagem (Download)
                </button>
            </div>
        </section>
    </div>

    <script>
        let sortedTeamsData = [];
        let drawCount = 0; 
        const ANIMATION_DELAY = 150; 

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function captureImage() {
            const resultsSection = document.getElementById('results-section');
            const captureArea = document.getElementById('capture-area'); 
            const loadingOverlay = document.getElementById('loading-capture');

            if (resultsSection.classList.contains('hidden')) return;

            loadingOverlay.classList.remove('hidden');

            html2canvas(captureArea, {
                scale: 2, 
                backgroundColor: '#ffffff', 
            }).then(canvas => {
                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = image;
                link.download = `times_sorteados_${drawCount}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                loadingOverlay.classList.add('hidden');
            }).catch(error => {
                loadingOverlay.classList.add('hidden');
                console.error(error);
            });
        }

        /**
         * Anima a distribuição dos jogadores.
         */
        function animateDraw(teams, teamListElements, onComplete) {
            const animationQueue = [];
            
            const maxPlayers = Math.max(...teams.map(t => t.length));
            
            for (let i = 0; i < maxPlayers; i++) {
                for (let t = 0; t < teams.length; t++) {
                    if (teams[t][i]) {
                        animationQueue.push({ 
                            player: teams[t][i], 
                            teamIndex: t 
                        });
                    }
                }
            }

            let index = 0;
            function step() {
                if (index >= animationQueue.length) {
                    onComplete();
                    return;
                }

                const { player, teamIndex } = animationQueue[index];
                const ul = teamListElements[teamIndex];
                const li = document.createElement('li');
                li.textContent = player;
                
                // Removido o destaque visual do asterisco, mantendo apenas o texto original
                ul.appendChild(li);

                setTimeout(() => {
                    li.classList.add('animated-in');
                }, 10);

                index++;
                setTimeout(step, ANIMATION_DELAY);
            }
            step();
        }

        function sortearTimes() {
            const inputElement = document.getElementById('names-input');
            const numTeamsInput = document.getElementById('num-teams-input');
            const minPlayersInput = document.getElementById('min-players-input');
            const sortButton = document.getElementById('sort-button'); 
            const captureButton = document.getElementById('capture-button');
            
            const errorMessage = document.getElementById('error-message');
            const countMessage = document.getElementById('count-message');
            const resultsSection = document.getElementById('results-section');
            const teamsContainer = document.getElementById('teams-container');
            const drawDatetimeElement = document.getElementById('draw-datetime'); 
            const drawCounterElement = document.getElementById('draw-counter'); 

            // RESET
            sortButton.disabled = true;
            sortButton.textContent = 'Sorteando... 🔄';
            resultsSection.classList.add('hidden');
            errorMessage.classList.add('hidden');
            countMessage.classList.add('hidden');
            teamsContainer.innerHTML = ''; 
            captureButton.classList.add('hidden'); 
            
            // 1. Processa nomes e separa Estrelas (*) de Regulares
            let allLines = inputElement.value.split('\n').map(n => n.trim()).filter(n => n !== '');
            
            let starredPlayers = allLines.filter(n => n.includes('*'));
            let regularPlayers = allLines.filter(n => !n.includes('*'));
            
            const N = allLines.length;
            const T = parseInt(numTeamsInput.value); 
            const M = parseInt(minPlayersInput.value); 

            // 2. Validações
            if (N === 0) {
                errorMessage.textContent = 'Por favor, insira pelo menos um nome.';
                errorMessage.classList.remove('hidden');
                sortButton.disabled = false;
                sortButton.textContent = '⚽ Sortear Times';
                return;
            }
            if (isNaN(T) || T < 2) {
                errorMessage.textContent = 'O número de times deve ser no mínimo 2.';
                errorMessage.classList.remove('hidden');
                sortButton.disabled = false;
                sortButton.textContent = '⚽ Sortear Times';
                return;
            }

            if (T > N) {
                errorMessage.textContent = `O número de times (${T}) não pode ser maior que o número total de jogadores (${N}).`;
                errorMessage.classList.remove('hidden');
                sortButton.disabled = false;
                sortButton.textContent = '⚽ Sortear Times';
                return;
            }

            // 3. Lógica de Sorteio com a regra do asterisco
            shuffleArray(starredPlayers);
            shuffleArray(regularPlayers);
            
            let teams = Array.from({ length: T }, () => []);
            
            // A - Distribuir jogadores com estrela (*) em times diferentes
            starredPlayers.forEach((player, index) => {
                const targetTeam = index % T;
                teams[targetTeam].push(player);
            });

            // B - Definir os tamanhos alvo
            let totalRemaining = N;
            let targetSizes = [];
            for (let i = 0; i < T; i++) {
                let size;
                if (i < T - 1) {
                    size = Math.min(M, totalRemaining - (T - 1 - i));
                } else {
                    size = totalRemaining;
                }
                size = Math.max(size, teams[i].length);
                targetSizes.push(size);
                totalRemaining -= size;
            }
            
            if (totalRemaining > 0) {
                for(let i=0; i < totalRemaining; i++) {
                    targetSizes[i % T]++;
                }
            }

            // C - Preencher com jogadores Regulares
            teams.forEach((team, i) => {
                const needed = targetSizes[i] - team.length;
                if (needed > 0) {
                    const toAdd = regularPlayers.splice(0, needed);
                    teams[i] = team.concat(toAdd);
                }
            });
            
            if (regularPlayers.length > 0) {
                teams[T-1] = teams[T-1].concat(regularPlayers);
            }

            // 4. UI e Animação
            sortedTeamsData = teams;
            const now = new Date();
            drawDatetimeElement.textContent = `Sorteio realizado em ${now.toLocaleDateString('pt-BR')} às ${now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
            drawCount++;
            drawCounterElement.textContent = `Sorteio Nº ${drawCount}`;

            resultsSection.classList.remove('hidden');

            let gridColsClass = T === 2 ? 'md:grid-cols-2' : (T === 3 ? 'md:grid-cols-3' : 'md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4');
            teamsContainer.className = `grid gap-6 ${gridColsClass}`;

            const teamColors = [
                { bg: 'bg-blue-50', text: 'text-blue-700' },
                { bg: 'bg-red-50', text: 'text-red-700' },
                { bg: 'bg-green-50', text: 'text-green-700' },
                { bg: 'bg-yellow-50', text: 'text-yellow-700' },
                { bg: 'bg-purple-50', text: 'text-purple-700' },
                { bg: 'bg-pink-50', text: 'text-pink-700' }
            ];

            const teamListElements = [];
            teams.forEach((teamPlayers, index) => {
                const teamNumber = index + 1;
                const color = teamColors[index % teamColors.length];
                const card = document.createElement('div');
                card.className = `team-card ${color.bg} p-6 rounded-xl shadow-md`;
                card.innerHTML = `
                    <h3 class="text-2xl font-extrabold ${color.text} mb-2">Time ${teamNumber}</h3>
                    <p class="text-sm text-gray-600 mb-4">Jogadores: <span class="font-bold">${teamPlayers.length}</span></p>
                    <ul id="team-list-${teamNumber}" class="player-list"></ul>
                `;
                teamsContainer.appendChild(card);
                teamListElements.push(document.getElementById(`team-list-${teamNumber}`));
            });

            countMessage.textContent = `Sorteando ${N} jogadores...`;
            countMessage.classList.remove('hidden');

            animateDraw(teams, teamListElements, () => {
                countMessage.textContent = `Sorteio finalizado com sucesso!`;
                sortButton.disabled = false;
                sortButton.textContent = '⚽ Sortear Times';
                captureButton.classList.remove('hidden');
                resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        }
    </script>

</body>
</html>
